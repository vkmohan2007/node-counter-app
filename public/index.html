<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <h1>Counter App</h1>
        <div class="counter-display" id="counter">0</div>
        <div class="btn-group">
            <button class="btn btn-increase" onclick="change(1)">+ Add / Increase</button>
            <button class="btn btn-decrease" onclick="change(-1)">− Subtract / Decrease</button>
        </div>
        <button class="btn btn-reset" onclick="reset()">Reset</button>
    </div>
    <script src="app.js"></script>
</body>

</html>
